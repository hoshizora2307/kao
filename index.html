<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KAO_LOVE_AND_HATE</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; cursor: crosshair; }
        canvas { display: block; }
        #message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-family: sans-serif;
            font-size: 10vw;
            text-shadow: 0 0 30px #ff0000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.05s;
            text-align: center;
            font-weight: bold;
        }
        /* ピンクの文字のスタイリング */
        .love-text {
            position: absolute;
            color: #ff69b4; /* かわいいピンク */
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 2.5rem;
            text-shadow: 0 0 15px #ffb6c1, 0 0 5px #fff;
            pointer-events: none;
            animation: fadeUp 1.5s forwards;
            white-space: nowrap;
            z-index: 100;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -100px); }
        }
    </style>
</head>
<body>
    <div id="message">SYSTEM ERROR:<br>KAO IS IDIOT</div>
    <canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('message');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const characters = 'KAO愛してるKAODAICHI苦しいERROR';
const rarePhrase = 'ＫＡＯはバカ自覚しろ';
const fontSize = 60; 
const columns = Math.ceil(canvas.width / fontSize);
const drops = Array(columns).fill(1);

let irritationLevel = 0;

function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    irritationLevel += 0.005;
    const isGlitching = Math.random() < Math.sin(irritationLevel) * 0.3;
    
    ctx.font = 'bold ' + fontSize + 'px sans-serif';

    for (let i = 0; i < drops.length; i++) {
        let text;
        if (Math.random() > 0.985) {
            ctx.fillStyle = '#ff0000'; 
            text = rarePhrase;
        } else {
            ctx.fillStyle = isGlitching ? '#f00' : '#0f0';
            text = characters.charAt(Math.floor(Math.random() * characters.length));
        }

        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
            drops[i] = 0;
        }
        drops[i] += 1 + (Math.sin(irritationLevel) * 1.5);
    }

    if (Math.sin(irritationLevel) > 0.85) {
        msg.style.opacity = '1';
        canvas.style.filter = 'invert(1) contrast(200%)';
    } else {
        msg.style.opacity = '0';
        canvas.style.filter = 'none';
    }

    requestAnimationFrame(draw);
}

// タップ（クリック）イベント
window.addEventListener('mousedown', (e) => {
    createLoveText(e.clientX, e.clientY);
});
window.addEventListener('touchstart', (e) => {
    createLoveText(e.touches[0].clientX, e.touches[0].clientY);
});

function createLoveText(x, y) {
    const love = document.createElement('div');
    love.className = 'love-text';
    love.innerText = 'I LOVE KAO.';
    love.style.left = x + 'px';
    love.style.top = y + 'px';
    document.body.appendChild(love);

    // アニメーションが終わったら要素を削除
    setTimeout(() => {
        love.remove();
    }, 1500);
}

window.addEventListener('resize', () => {
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
});

draw();
</script>
</body>
</html>
