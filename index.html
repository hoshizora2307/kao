<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LOVE_OR_ERROR_FOR_KAO_LARGE</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        canvas { display: block; }
        #message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8vw; /* 中央の警告メッセージもさらに大きくしました */
            text-shadow: 0 0 20px #ff0000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="message">SYSTEM ERROR:<br>DAICHI ANNIHILATED</div>
    <canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('message');

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

// 文字列から「KAO」が選ばれやすいように調整
const characters = 'KAO愛してるKAODAICHI苦しいERROR';
const fontSize = 40; // ★ここを16から40に大きくしました
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

let irritationLevel = 0;

function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // 残像を少し濃くして文字を追いやすく
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    irritationLevel += 0.005;
    const isGlitching = Math.random() < Math.sin(irritationLevel) * 0.2;
    
    // 文字を太字（bold）にしてより強調
    ctx.font = 'bold ' + fontSize + 'px monospace';
    ctx.fillStyle = isGlitching ? '#f00' : '#0f0';

    for (let i = 0; i < drops.length; i++) {
        const text = characters.charAt(Math.floor(Math.random() * characters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i] += 1 + (Math.sin(irritationLevel) * 2);
    }

    if (Math.sin(irritationLevel) > 0.9) {
        msg.style.opacity = '1';
        canvas.style.filter = 'invert(1) blur(2px)'; // 反転時に少しブレさせてバグ感を演出
    } else {
        msg.style.opacity = '0';
        canvas.style.filter = 'none';
    }

    requestAnimationFrame(draw);
}

window.addEventListener('resize', () => {
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
});

draw();
</script>
</body>
</html>
